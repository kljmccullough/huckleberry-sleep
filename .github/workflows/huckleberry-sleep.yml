name: Fetch Huckleberry sleep data

# Runs on a schedule AND can be triggered by hand from the Actions tab.
on:
  workflow_dispatch: {}
  schedule:
    # Hourly (UTC). GitHub's free scheduled runs are "best-effort" and can be
    # delayed or skipped, so we run every hour to shrink the gaps — especially
    # important right before the 7am and 4:45pm Pacific briefings. The extra
    # lines cluster runs just ahead of those two briefings for freshness.
    - cron: "0 * * * *"
    # Extra attempts before the 7am Pacific briefing (14:00 UTC / 15:00 UTC DST-safe):
    - cron: "20,40 13,14 * * *"
    # Extra attempts before the 4:45pm Pacific briefing (23:45 UTC / 00:45 UTC DST-safe):
    - cron: "20,40 23,0 * * *"

# Allow the job to commit the refreshed data back to the repo.
permissions:
  contents: write

# If a run is still going when the next fires, cancel the old one.
concurrency:
  group: huckleberry-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sleep data
        env:
          HUCKLEBERRY_EMAIL: ${{ secrets.HUCKLEBERRY_EMAIL }}
          HUCKLEBERRY_PASSWORD: ${{ secrets.HUCKLEBERRY_PASSWORD }}
          # Optional repo Variables (Settings -> Secrets and variables -> Actions -> Variables):
          HB_TIMEZONE: ${{ vars.HB_TIMEZONE }}
          HB_CHILD_INDEX: ${{ vars.HB_CHILD_INDEX }}
          HB_LOOKBACK_DAYS: ${{ vars.HB_LOOKBACK_DAYS }}
          HB_INCLUDE_NICKNAME: ${{ vars.HB_INCLUDE_NICKNAME }}
        run: python fetch.py

      - name: Commit refreshed data
        run: |
          git config user.name "huckleberry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.jsonl data/food.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update sleep data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
